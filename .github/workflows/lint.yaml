name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          yamllint -c .yamllint \
            helmfile/charts/ilias/values.yaml \
            helmfile/charts/moodle/values.yaml \
            helmfile/charts/bigbluebutton/values.yaml \
            helmfile/charts/opencloud/values.yaml \
            docs/ \
            .github/ \
            publiccode.yml

  helm-lint:
    name: Helm Lint (edu charts)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart:
          - helmfile/charts/ilias
          - helmfile/charts/moodle
          - helmfile/charts/bigbluebutton
          - helmfile/charts/opencloud
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint "${{ matrix.chart }}"

  spellcheck:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cspell
        run: npm install -g cspell

      - name: Run cspell
        run: |
          cspell --config cspell.json \
            "README.md" "ROADMAP.md" "CONTRIBUTING.md" \
            "docs/university-apps-concept.md" "docs/external-services.md" \
            "docs/getting-started.md" \
            ".github/" \
            --no-progress

  check-secrets:
    name: Secret Leak Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: .
          extra_args: --only-verified --filter "path=helmfile/apps/" --filter "path=docs/external-services/ilias-deployment-guide.md"
