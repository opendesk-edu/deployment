<svg id="openDeskEduLogo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 240">
  <defs>
    <style>
      .edu-primary { fill: #571EFA; }
      .edu-secondary { fill: #341291; }
      .edu-accent { fill: #927AFA; }
      .edu-text { fill: #341291; font-family: Arial, sans-serif; font-weight: bold; }
      .edu-text-light { fill: #571EFA; font-family: Arial, sans-serif; font-weight: normal; }
    </style>
  </defs>
  
  <!-- Icon section -->
  <g id="icon">
    <!-- Base square from original logo -->
    <path class="edu-secondary" d="M40 120V122C40 132 32 140 22 140H20C10 140 2 132 2 122V80C2 70 10 62 20 62H22C32 62 40 70 40 80V120Z"/>
    <path class="edu-primary" d="M41 106H2V62C2 50 12 40 24 40H70C82 40 92 50 92 62V106H41Z"/>
    
    <!-- Graduation cap overlay -->
    <path class="edu-accent" d="M140 90L110 105L140 120L170 105L140 90Z"/>
    <path class="edu-primary" d="M110 105L140 120V140H110V105Z"/>
    <path class="edu-secondary" d="M140 120L170 105V140H140V120Z"/>
    <circle class="edu-accent" cx="170" cy="105" r="5"/>
    <path class="edu-accent" d="M170 105L173 115L170 125" stroke="#927AFA" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Text section -->
  <g id="text">
    <!-- openDesk -->
    <text class="edu-text" x="160" y="125" font-size="72">open</text>
    <text class="edu-text-light" x="340" y="125" font-size="72">Desk</text>
    
    <!-- Edu badge -->
    <g>
      <rect x="480" y="85" width="90" height="50" rx="8" class="edu-primary"/>
      <text x="525" y="118" class="edu-text" font-size="36" fill="white">Edu</text>
    </g>
    
    <!-- Tagline -->
    <text x="160" y="175" class="edu-text-light" font-size="24">Educational Services for Universities</text>
  </g>
</svg>
