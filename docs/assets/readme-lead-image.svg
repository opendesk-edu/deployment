<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#571EFA"/>
      <stop offset="100%" stop-color="#341291"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#927AFA"/>
      <stop offset="100%" stop-color="#571EFA"/>
    </linearGradient>
  </defs>
  
  <rect width="1200" height="400" fill="url(#bgGradient)"/>
  
  <!-- Abstract network/pattern background -->
  <g opacity="0.1">
    <circle cx="100" cy="100" r="80" fill="white"/>
    <circle cx="1100" cy="300" r="120" fill="white"/>
    <circle cx="600" cy="200" r="150" fill="white"/>
    <line x1="0" y1="0" x2="1200" y2="400" stroke="white" stroke-width="2"/>
    <line x1="1200" y1="0" x2="0" y2="400" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- Main content -->
  <g id="main-content">
    <!-- Central logo icon -->
    <g transform="translate(100, 80)">
      <!-- Base square -->
      <path fill="white" d="M0 60V62C0 72 -8 80 -18 80H-20C-30 80 -38 72 -38 62V20C-38 10 -30 2 -20 2H-18C-8 2 0 10 0 20V60Z"/>
      <path fill="url(#accentGradient)" d="M1 46H-38V20C-38 8 -28 -2 -16 -2H30C42 -2 52 8 52 20V46H1Z"/>
      
      <!-- Graduation cap -->
      <path fill="#927AFA" d="M60 30L30 45L60 60L90 45L60 30Z"/>
      <path fill="white" d="M30 45L60 60V80H30V45Z"/>
      <path fill="white" d="M60 60L90 45V80H60V60Z"/>
      <circle fill="#927AFA" cx="90" cy="45" r="5"/>
    </g>
    
    <!-- Title text -->
    <text x="350" y="140" fill="white" font-family="Arial, sans-serif" font-size="64" font-weight="bold">openDesk Edu</text>
    <text x="350" y="190" fill="white" font-family="Arial, sans-serif" font-size="28" opacity="0.9">Educational Services for Universities</text>
    
    <!-- Service icons row -->
    <g id="services" transform="translate(350, 260)">
      <!-- ILIAS icon -->
      <g transform="translate(0, 0)">
        <rect width="80" height="80" rx="12" fill="white"/>
        <path fill="#571EFA" d="M40 20L10 35V55L40 70L70 55V35L40 20Z"/>
        <path fill="#341291" d="M10 35L40 50V70L10 55V35Z"/>
        <circle fill="#927AFA" cx="70" cy="35" r="4"/>
      </g>
      
      <!-- Moodle icon -->
      <g transform="translate(110, 0)">
        <rect width="80" height="80" rx="12" fill="white"/>
        <path fill="#571EFA" d="M20 55C20 55 25 40 35 35C45 30 50 20 55 20C60 20 65 25 65 35" stroke="#571EFA" stroke-width="5" stroke-linecap="round" fill="none"/>
        <circle cx="20" cy="55" r="4" fill="#571EFA"/>
        <circle cx="35" cy="35" r="4" fill="#571EFA"/>
        <circle cx="55" cy="20" r="4" fill="#571EFA"/>
      </g>
      
      <!-- BigBlueButton icon -->
      <g transform="translate(220, 0)">
        <rect width="80" height="80" rx="12" fill="white"/>
        <rect x="10" y="15" width="60" height="40" rx="4" fill="#571EFA"/>
        <rect x="15" y="20" width="20" height="16" rx="2" fill="white" opacity="0.8"/>
        <rect x="40" y="20" width="30" height="16" rx="2" fill="white" opacity="0.6"/>
        <path fill="#341291" d="M35 60V65C35 68 32 70 28 70C24 70 21 68 21 65V60"/>
        <rect x="21" y="50" width="14" height="12" rx="3" fill="#341291"/>
      </g>
      
      <!-- OpenCloud icon -->
      <g transform="translate(330, 0)">
        <rect width="80" height="80" rx="12" fill="white"/>
        <path fill="#571EFA" d="M20 55C15 55 10 50 10 43C10 35 17 30 22 30C24 30 26 31 27 32C29 25 35 20 42 20C52 20 59 27 59 35C59 36 58 37 58 38C65 38 70 43 70 50C70 57 65 62 58 62H20Z"/>
        <path fill="#341291" d="M25 45H50C53 45 55 47 55 50V58C55 61 53 63 50 63H25C22 63 20 61 20 58V45C20 42 22 40 25 40H30L35 45H50C53 45 55 47 55 50"/>
      </g>
    </g>
    
    <!-- Feature badges -->
    <g id="features" transform="translate(100, 340)">
      <g transform="translate(0, 0)">
        <rect width="140" height="40" rx="20" fill="white" opacity="0.2"/>
        <text x="70" y="25" fill="white" font-family="Arial" font-size="14" text-anchor="middle">🔐 SSO Integrated</text>
      </g>
      
      <g transform="translate(160, 0)">
        <rect width="140" height="40" rx="20" fill="white" opacity="0.2"/>
        <text x="70" y="25" fill="white" font-family="Arial" font-size="14" text-anchor="middle">📚 LMS Platforms</text>
      </g>
      
      <g transform="translate(320, 0)">
        <rect width="140" height="40" rx="20" fill="white" opacity="0.2"/>
        <text x="70" y="25" fill="white" font-family="Arial" font-size="14" text-anchor="middle">🎥 Video Conferencing</text>
      </g>
      
      <g transform="translate(480, 0)">
        <rect width="140" height="40" rx="20" fill="white" opacity="0.2"/>
        <text x="70" y="25" fill="white" font-family="Arial" font-size="14" text-anchor="middle">☁️ Cloud Storage</text>
      </g>
      
      <g transform="translate(640, 0)">
        <rect width="140" height="40" rx="20" fill="white" opacity="0.2"/>
        <text x="70" y="25" fill="white" font-family="Arial" font-size="14" text-anchor="middle">🚀 One-Click Deploy</text>
      </g>
    </g>
  </g>
</svg>
