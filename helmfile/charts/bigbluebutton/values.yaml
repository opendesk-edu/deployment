bigbluebutton:
  image: "ghcr.io/<your-org>/greenlight-saml"
  tag: "v1.3.0"
  replicaCount: 2
  volumes:
    recordings:
      name: bbb-recordings
      size: 500Gi
      accessMode: ReadWriteMany
      storageClass: ceph-cephfs-hdd-ec
  greenlight:
    databaseUrl: ""  # REQUIRED: Override via --set or values file before deployment
    secretKeyBase: ""  # REQUIRED: Override via --set or values file before deployment
    defaultRegistration: "saml"

service:
  externalPort: 80
  enabled: true
  annotations: {}

ingress:
  enabled: true
  className: "haproxy"
  annotations:
    haproxy-ingress.github.io/ssl-redirect: "true"
    haproxy-ingress.github.io/timeout-server: "120000ms"
    haproxy-ingress.github.io/timeout-client: "120000ms"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    host: "bbb.opendesk.example.com"
    paths:
      path: "/"
      pathType: "ImplementationSpecific"
  tls:
    secretName: "opendesk-certificates-tls"