apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hisinone-proxy.fullname" . }}-config
  labels:
{{ include "hisinone-proxy.labels" . | nindent 4 }}
data:
  config.json: |
    {
      "hisinone": {
        "soap_endpoint": "{{ .Values.hisinone.endpoint }}",
        "username": "${HIS_USERNAME}",
        "password": "${HIS_PASSWORD}",
        "ssl_verify": {{ .Values.hisinone.sslVerify | toJson }}
      },
      "tcp_listener": {
        "host": "0.0.0.0",
        "port": {{ .Values.tcpListener.port | toJson }},
        "timeout": 30
      },
      "database": {
        "driver": "mysql",
        "host": "${DB_HOST}",
        "database": "${DB_NAME}",
        "username": "${DB_USER}",
        "password": "${DB_PASSWORD}"
      },
      "targets": {
        "ilias": {
          "enabled": {{ .Values.targets.ilias.enabled | toJson }},
          "endpoint": "{{ .Values.targets.ilias.endpoint }}"
        },
        "keycloak": {
          "enabled": {{ .Values.targets.keycloak.enabled | toJson }},
          "ldap_base": "{{ .Values.targets.keycloak.ldapBase }}"
        },
        "opencloud": {
          "enabled": {{ .Values.targets.opencloud.enabled | toJson }}
        },
        "zammad": {
          "enabled": {{ .Values.targets.zammad.enabled | toJson }}
        }
      }
    }