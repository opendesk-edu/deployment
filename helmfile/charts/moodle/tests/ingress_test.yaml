suite: Ingress
templates:
  - ingress.yaml
tests:
  - it: should not create an Ingress when disabled
    set:
      ingress.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should create an Ingress when enabled
    set:
      ingress.enabled: true
    asserts:
      - isKind:
          of: Ingress
      - isNotNull:
          path: spec.rules

  - it: should set the ingress class
    set:
      ingress.enabled: true
    asserts:
      - equal:
          path: spec.ingressClassName
          value: "haproxy"

  - it: should configure the host from values
    set:
      ingress.enabled: true
    asserts:
      - equal:
          path: spec.rules[0].host
          value: "moodle.opendesk.example.com"
