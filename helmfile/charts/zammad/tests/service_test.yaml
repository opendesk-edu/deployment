suite: Service
templates:
  - service.yaml
values:
  - ../ci/ci-values.yaml
tests:
  - it: should create a Service
    asserts:
      - isKind:
          of: Service

  - it: should expose the configured port
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 3000

  - it: should target the same port
    asserts:
      - equal:
          path: spec.ports[0].targetPort
          value: 3000

  - it: should be of type ClusterIP
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should have correct selector labels
    asserts:
      - isSubset:
          path: spec.selector
          content:
            zammad/server: "true"

  - it: should have standard Kubernetes labels
    asserts:
      - isNotNull:
          path: metadata.labels["app.kubernetes.io/name"]
      - isNotNull:
          path: metadata.labels["app.kubernetes.io/instance"]
